<?xml version="1.0" encoding="UTF-8"?>
<!--
  DIMORAMI — Logo Primario
  Variante: Travertino Scuro su Calce
  Versione: 1.0 — Giugno 2026

  Colori sistema:
    Calce      #F5F1EA  — sfondo primario
    Travertino #8C6A43  — linee di costruzione + tagline
    Lava       #171717  — (non usato in questa variante)
    D primario #4A3020  — simbolo e wordmark (Travertino Scuro)
    D micro    #2C1F16  — usare SOLO sotto 16px (Inchiostro)

  Geometria costruttiva:
    Centro cerchi: (200, 175)
    Raggio esterno R:  115px
    Raggio interno r:   89px  (rapporto 0.774)
    Larghezza stelo:    24px
    Altezza barre:      26px  (R - r)
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 500"
  width="400"
  height="500"
  role="img"
  aria-label="DIMORAMI — Premium Renovation Advisory">

  <title>DIMORAMI Logo</title>
  <desc>Logo DIMORAMI con simbolo D costruttivo e wordmark Cormorant Garamond</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Sfondo Calce -->
  <rect width="400" height="500" fill="#F5F1EA"/>

  <!-- ═══════════════════════════════════════════
       LINEE DI COSTRUZIONE — TRAVERTINO #8C6A43
       Le linee di costruzione sono parte del logo.
       ═══════════════════════════════════════════ -->

  <!-- Cerchio esterno (genera il ventre della D) -->
  <circle cx="200" cy="175" r="115"
    fill="none" stroke="#8C6A43" stroke-width="1.0" opacity="0.68"/>

  <!-- Cerchio interno (genera il controforme) — tratteggiato -->
  <circle cx="200" cy="175" r="89"
    fill="none" stroke="#8C6A43" stroke-width="0.8"
    stroke-dasharray="4,6" opacity="0.55"/>

  <!-- Cerchio sezione aurea — fine tratteggio -->
  <circle cx="200" cy="175" r="71"
    fill="none" stroke="#8C6A43" stroke-width="0.45"
    stroke-dasharray="1.5,5" opacity="0.28"/>

  <!-- Asse orizzontale -->
  <line x1="20" y1="175" x2="380" y2="175"
    stroke="#8C6A43" stroke-width="0.7" opacity="0.50"/>

  <!-- Asse verticale -->
  <line x1="200" y1="22" x2="200" y2="315"
    stroke="#8C6A43" stroke-width="0.7" opacity="0.50"/>

  <!-- Bordo sinistro — tratteggiato -->
  <line x1="85" y1="22" x2="85" y2="315"
    stroke="#8C6A43" stroke-width="0.55"
    stroke-dasharray="2.5,5" opacity="0.36"/>

  <!-- Bordo stelo — fine tratteggio -->
  <line x1="109" y1="50" x2="109" y2="315"
    stroke="#8C6A43" stroke-width="0.42"
    stroke-dasharray="1.5,5" opacity="0.24"/>

  <!-- Linea di raggio R -->
  <line x1="200" y1="175" x2="315" y2="175"
    stroke="#8C6A43" stroke-width="0.55" opacity="0.36"/>
  <!-- Linea di raggio r — tratteggiata -->
  <line x1="200" y1="175" x2="289" y2="175"
    stroke="#8C6A43" stroke-width="0.45"
    stroke-dasharray="2,4" opacity="0.26"/>

  <!-- Etichette raggi -->
  <text x="252" y="170"
    font-family="Georgia, serif" font-size="10"
    fill="#8C6A43" opacity="0.62" font-style="italic">R</text>
  <text x="232" y="170"
    font-family="Georgia, serif" font-size="8.5"
    fill="#8C6A43" opacity="0.46" font-style="italic">r</text>

  <!-- Croce centro — precisa -->
  <line x1="190" y1="175" x2="210" y2="175"
    stroke="#8C6A43" stroke-width="1.8" opacity="0.82"/>
  <line x1="200" y1="165" x2="200" y2="185"
    stroke="#8C6A43" stroke-width="1.8" opacity="0.82"/>

  <!-- Punti costruttivi chiave -->
  <circle cx="200" cy="175" r="3.0" fill="#8C6A43" opacity="0.80"/>
  <circle cx="200" cy="60"  r="2.8" fill="#8C6A43" opacity="0.65"/>
  <circle cx="200" cy="290" r="2.8" fill="#8C6A43" opacity="0.65"/>
  <circle cx="315" cy="175" r="2.8" fill="#8C6A43" opacity="0.65"/>
  <circle cx="85"  cy="175" r="2.8" fill="#8C6A43" opacity="0.62"/>
  <circle cx="200" cy="86"  r="2.2" fill="#8C6A43" opacity="0.52"/>
  <circle cx="200" cy="264" r="2.2" fill="#8C6A43" opacity="0.52"/>
  <circle cx="289" cy="175" r="2.0" fill="#8C6A43" opacity="0.45"/>

  <!-- Tacche proporzionali — asse verticale -->
  <line x1="193" y1="60"  x2="207" y2="60"  stroke="#8C6A43" stroke-width="1.2" opacity="0.65"/>
  <line x1="194" y1="86"  x2="206" y2="86"  stroke="#8C6A43" stroke-width="0.95" opacity="0.50"/>
  <line x1="194" y1="264" x2="206" y2="264" stroke="#8C6A43" stroke-width="0.95" opacity="0.50"/>
  <line x1="193" y1="290" x2="207" y2="290" stroke="#8C6A43" stroke-width="1.2" opacity="0.65"/>

  <!-- Tacche proporzionali — asse orizzontale -->
  <line x1="85"  y1="168" x2="85"  y2="182" stroke="#8C6A43" stroke-width="1.2" opacity="0.62"/>
  <line x1="109" y1="170" x2="109" y2="180" stroke="#8C6A43" stroke-width="0.9"  opacity="0.44"/>
  <line x1="315" y1="168" x2="315" y2="182" stroke="#8C6A43" stroke-width="1.2" opacity="0.62"/>
  <line x1="289" y1="170" x2="289" y2="180" stroke="#8C6A43" stroke-width="0.9"  opacity="0.44"/>

  <!-- Archi di compasso — angoli D (impronta dello strumento) -->
  <path d="M 168,64 A 34,34 0 0 1 232,64"
    fill="none" stroke="#8C6A43" stroke-width="0.6" opacity="0.34"/>
  <path d="M 168,286 A 34,34 0 0 0 232,286"
    fill="none" stroke="#8C6A43" stroke-width="0.6" opacity="0.34"/>
  <path d="M 174,88 A 26,26 0 0 1 226,88"
    fill="none" stroke="#8C6A43" stroke-width="0.45" opacity="0.22"/>
  <path d="M 174,262 A 26,26 0 0 0 226,262"
    fill="none" stroke="#8C6A43" stroke-width="0.45" opacity="0.22"/>

  <!-- ═══════════════════════════════════════════
       SIMBOLO D — TRAVERTINO SCURO #4A3020
       Portale ruotato 90° — due cerchi concentrici
       ═══════════════════════════════════════════ -->
  <path
    fill-rule="evenodd"
    fill="#4A3020"
    d="M 85,60
       L 200,60
       A 115,115 0 0 1 200,290
       L 85,290
       Z
       M 200,86
       A 89,89 0 0 1 200,264
       L 109,264
       L 109,86
       Z"/>

  <!-- ═══════════════════════════════════════════
       WORDMARK — Cormorant Garamond Light 300
       ═══════════════════════════════════════════ -->

  <text
    x="200" y="362"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Cormorant', Georgia, serif"
    font-weight="300"
    font-size="23"
    letter-spacing="9"
    textLength="230"
    lengthAdjust="spacingAndGlyphs"
    fill="#4A3020">DIMORAMI</text>

  <!-- Separatore — larghezza del simbolo D (x=85 → x=315) -->
  <line x1="85" y1="375" x2="315" y2="375"
    stroke="#8C6A43" stroke-width="0.6" opacity="0.55"/>

  <!-- Tagline — stessa larghezza del simbolo -->
  <text
    x="200" y="393"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-weight="300"
    font-size="9.5"
    textLength="230"
    lengthAdjust="spacingAndGlyphs"
    fill="#8C6A43">PREMIUM RENOVATION ADVISORY</text>

</svg>
