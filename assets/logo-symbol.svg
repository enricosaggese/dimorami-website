<!--
  DIMORAMI — Simbolo Isolato
  Sfondo trasparente — uso: favicon, avatar social, timbro, wax seal
  Versione: 1.0 — Giugno 2026

  NOTA MICRO: sotto 16px usare fill="#2C1F16" invece di #4A3020
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 280"
  width="280"
  height="280"
  role="img"
  aria-label="DIMORAMI — simbolo D">

  <title>DIMORAMI Simbolo</title>

  <!-- Sfondo trasparente — nessun rect di sfondo -->

  <!-- ═══ COSTRUZIONE — R=110, r=85, centro (140,140) ═══ -->

  <circle cx="140" cy="140" r="110"
    fill="none" stroke="#8C6A43" stroke-width="1.1" opacity="0.68"/>
  <circle cx="140" cy="140" r="85"
    fill="none" stroke="#8C6A43" stroke-width="0.85"
    stroke-dasharray="4,6" opacity="0.55"/>
  <circle cx="140" cy="140" r="68"
    fill="none" stroke="#8C6A43" stroke-width="0.45"
    stroke-dasharray="1.5,5" opacity="0.28"/>

  <line x1="16" y1="140" x2="264" y2="140" stroke="#8C6A43" stroke-width="0.7"  opacity="0.50"/>
  <line x1="140" y1="16" x2="140" y2="264" stroke="#8C6A43" stroke-width="0.7"  opacity="0.50"/>
  <line x1="30" y1="16" x2="30" y2="264"   stroke="#8C6A43" stroke-width="0.55" stroke-dasharray="2.5,5" opacity="0.36"/>
  <line x1="52" y1="24" x2="52" y2="264"   stroke="#8C6A43" stroke-width="0.42" stroke-dasharray="1.5,5" opacity="0.24"/>
  <line x1="140" y1="140" x2="250" y2="140" stroke="#8C6A43" stroke-width="0.5" opacity="0.34"/>

  <text x="188" y="135"
