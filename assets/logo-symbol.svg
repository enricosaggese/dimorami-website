  <line x1="132" y1="30"  x2="148" y2="30"  stroke="#8C6A43" stroke-width="1.3" opacity="0.65"/>
  <line x1="132" y1="250" x2="148" y2="250" stroke="#8C6A43" stroke-width="1.3" opacity="0.65"/>
  <line x1="132" y1="55"  x2="148" y2="55"  stroke="#8C6A43" stroke-width="1.0" opacity="0.50"/>
  <line x1="132" y1="225" x2="148" y2="225" stroke="#8C6A43" stroke-width="1.0" opacity="0.50"/>
  <line x1="30"  y1="132" x2="30"  y2="148" stroke="#8C6A43" stroke-width="1.3" opacity="0.62"/>
  <line x1="250" y1="132" x2="250" y2="148" stroke="#8C6A43" stroke-width="1.3" opacity="0.62"/>
  <line x1="52"  y1="134" x2="52"  y2="146" stroke="#8C6A43" stroke-width="0.9" opacity="0.44"/>

  <!-- Archi compasso -->
  <path d="M 105,34 A 38,38 0 0 1 175,34"  fill="none" stroke="#8C6A43" stroke-width="0.65" opacity="0.34"/>
  <path d="M 105,246 A 38,38 0 0 0 175,246" fill="none" stroke="#8C6A43" stroke-width="0.65" opacity="0.34"/>
  <path d="M 111,57 A 30,30 0 0 1 169,57"  fill="none" stroke="#8C6A43" stroke-width="0.48" opacity="0.22"/>
  <path d="M 111,223 A 30,30 0 0 0 169,223" fill="none" stroke="#8C6A43" stroke-width="0.48" opacity="0.22"/>

  <!-- ═══ SIMBOLO D ═══ -->
  <!-- R=110, r=85, D top=30, D bottom=250, D left=30 -->
  <!-- Counter top=55, Counter bottom=225, Stem right=52 -->
  <path
    fill-rule="evenodd"
    fill="#4A3020"
    d="M 30,30
       L 140,30
       A 110,110 0 0 1 140,250
       L 30,250
       Z
       M 140,55
       A 85,85 0 0 1 140,225
       L 52,225
       L 52,55
       Z"/>

</svg>
