  <text x="164" y="135"
    font-family="Georgia, serif" font-size="9"
    fill="#8C6A43" opacity="0.44" font-style="italic">r</text>

  <!-- Croce centro -->
  <line x1="129" y1="140" x2="151" y2="140" stroke="#8C6A43" stroke-width="2.0" opacity="0.82"/>
  <line x1="140" y1="129" x2="140" y2="151" stroke="#8C6A43" stroke-width="2.0" opacity="0.82"/>

  <!-- Punti chiave -->
  <circle cx="140" cy="140" r="3.2" fill="#8C6A43" opacity="0.80"/>
  <circle cx="140" cy="30"  r="3.0" fill="#8C6A43" opacity="0.65"/>
  <circle cx="140" cy="250" r="3.0" fill="#8C6A43" opacity="0.65"/>
  <circle cx="250" cy="140" r="3.0" fill="#8C6A43" opacity="0.65"/>
  <circle cx="30"  cy="140" r="3.0" fill="#8C6A43" opacity="0.62"/>
  <circle cx="140" cy="55"  r="2.4" fill="#8C6A43" opacity="0.52"/>
  <circle cx="140" cy="225" r="2.4" fill="#8C6A43" opacity="0.52"/>
  <circle cx="225" cy="140" r="2.2" fill="#8C6A43" opacity="0.45"/>

