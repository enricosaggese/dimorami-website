<?xml version="1.0" encoding="UTF-8"?>
<!--
  DIMORAMI Favicon SVG
  Ottimizzato per 16-64px: simbolo semplificato, colore Inchiostro #2C1F16
  Per uso: link rel="icon" type="image/svg+xml" href="favicon.svg"
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
     width="32" height="32" role="img" aria-label="DIMORAMI">
  <title>DIMORAMI</title>
  <!-- Sfondo Calce -->
  <rect width="32" height="32" fill="#F5F1EA" rx="4"/>
  <!-- Linee costruttive semplificate (solo sopra 24px) -->
  <circle cx="16" cy="16" r="12.8" fill="none" stroke="#8C6A43"
          stroke-width="0.6" opacity="0.55"/>
  <line x1="2"  y1="16" x2="30" y2="16" stroke="#8C6A43" stroke-width="0.5" opacity="0.40"/>
  <line x1="16" y1="2"  x2="16" y2="30" stroke="#8C6A43" stroke-width="0.5" opacity="0.40"/>
  <line x1="3"  y1="2"  x2="3"  y2="30" stroke="#8C6A43" stroke-width="0.4"
        stroke-dasharray="1.5,2.5" opacity="0.30"/>
  <line x1="13" y1="15" x2="19" y2="15" stroke="#8C6A43" stroke-width="1.0" opacity="0.70"/>
  <line x1="16" y1="12" x2="16" y2="20" stroke="#8C6A43" stroke-width="1.0" opacity="0.70"/>
  <circle cx="16" cy="16" r="1.2" fill="#8C6A43" opacity="0.72"/>
  <!-- D Symbol — Inchiostro per leggibilità a piccole dimensioni -->
  <path fill-rule="evenodd" fill="#2C1F16"
        d="M 3.2,3.2 L 16,3.2 A 12.8,12.8 0 0 1 16,28.8 L 3.2,28.8 Z
           M 16,6.4 A 9.8,9.8 0 0 1 16,25.6 L 6.0,25.6 L 6.0,6.4 Z"/>
</svg>
